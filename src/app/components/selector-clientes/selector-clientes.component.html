<div id="contenedor">
  <div class="barra-busqueda">
    <ion-searchbar #barra placeholder="Introduzca algún dato del cliente" (ionInput)="filtrarBusqueda($event)" (ionClear)="resetearFiltros()" (keyup.enter)="fijarFiltro($event)" (ionFocus)="seleccionarTexto($event)"></ion-searchbar>
    <ion-button fill="clear" (click)="annadirCliente($event)" title="Nuevo cliente">
      <ion-icon slot="icon-only" name="person-add"></ion-icon>
    </ion-button>
  </div>
  <ion-chip color="medium" *ngFor="let filtroFijado of filtrosFijados" outline="true">
    <ion-label>{{filtroFijado}}</ion-label>
    <ion-icon name="close" (click)="quitarFiltro(filtroFijado)"></ion-icon>
  </ion-chip>
  <div id="myFixZone" scrollY="true">
    <ion-list>
      <ion-item *ngFor="let cliente of datosFiltrados" (click)="seleccionarDato(cliente)">
        <ion-label class="ion-text-wrap">
          <ion-icon name="contact" [color]="colorEstado(cliente.estado)" slot="start"></ion-icon>
          <h2 class="ion-text-wrap">{{ cliente.nombre }}</h2>
          <h3 class="ion-text-wrap">{{ cliente.direccion }}</h3>
          <p class="ion-text-wrap">{{ cliente.codigoPostal }} {{ cliente.poblacion }} ({{ cliente.provincia }})</p>
          <p class="ion-text-wrap">{{ cliente.cliente }} - {{ cliente.telefono }}</p>
          <p class="ion-text-wrap">{{ cliente.comentarios }}</p>
          <ion-fab horizontal="end" vertical="center" edge>
            <ion-fab-button size="small" (click)="crearContacto($event, cliente)" horizontal="end" [disabled]="cliente.cifNif == null"><ion-icon name="add"></ion-icon></ion-fab-button>
            <ion-fab-button size="small" (click)="editarContacto($event, cliente)" horizontal="end" [disabled]="cliente.cifNif == null"><ion-icon name="create"></ion-icon></ion-fab-button>
          </ion-fab>
        </ion-label>
      </ion-item>
    </ion-list>
  </div>
</div>
