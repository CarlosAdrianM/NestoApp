<ion-item>
  <ion-select label="Almacén" label-placement="start" [(ngModel)]="seleccionado" (ionChange)="seleccionarDato(seleccionado)">
      <ion-select-option *ngFor="let almacen of datosFiltrados" value="{{almacen.almacen}}" checked="almacen.almacen===seleccionado">{{almacen.descripcion}}</ion-select-option>
  </ion-select>
</ion-item>
