<ion-item [hidden]="!mostrar()">
  <ion-select [label]="etiqueta" label-placement="start" [(ngModel)]="seleccionado" (ionChange)="seleccionarDato(seleccionado)">
    <ion-select-option *ngFor="let vendedor of datosFiltrados" value="{{vendedor.vendedor}}" checked="vendedor.vendedor==seleccionado">{{vendedor.nombre}}</ion-select-option>
  </ion-select>
</ion-item>
