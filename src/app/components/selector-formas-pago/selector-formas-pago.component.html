<ion-item>
  <ion-select label="Forma de Pago" label-placement="start" *ngIf="datosFiltrados" [(ngModel)]="seleccionado" (ionChange)="seleccionarDato(seleccionado)">
    <ion-select-option
      *ngFor="let forma of datosFiltrados"
      value="{{forma.formaPago}}"
      [disabled]="esBloqueada(forma)"
      checked="forma.formaPago===seleccionado">
      {{forma.descripcion}}
    </ion-select-option>
  </ion-select>
</ion-item>
